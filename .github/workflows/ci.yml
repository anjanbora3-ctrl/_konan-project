name: SINGULARITY ENGINE CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sympy==1.14.0 llvmlite==0.46.0 pytest

    - name: Set up GCC
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Build C Engine
      run: |
        cd core_c
        make clean || true
        make
        ls -lh libengine.so
        cd ..

    - name: Run C Self-Tests
      run: |
        cd core_c
        make test
        cd ..

    - name: Verify JIT and Environment
      run: |
        # Quick diagnostic check
        PYTHONPATH=. python -c "from jit_layer.jit_stub import jit_engine; print(f'JIT Available: {jit_engine.available}'); print(f'JIT Status: {jit_engine.status()}')"
        PYTHONPATH=. python -c "from python_layer.bridge import _lib; print(f'C Engine Loaded: {_lib is not None}')"

    - name: Run Integration Tests
      run: |
        # Ensure libengine.so can be found (Linux uses .so)
        # We set PYTHONPATH to include the project root
        PYTHONPATH=. pytest tests/test_engine.py -v -s
