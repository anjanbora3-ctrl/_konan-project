name: SINGULARITY ENGINE CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      # Fix the Node.js 20 deprecation warning shown in the error image
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sympy==1.14.0 llvmlite==0.46.0 pytest

    - name: Set up GCC
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Build C Engine
      run: |
        cd core_c
        make clean || true
        make
        ls -lh libengine.so
        cd ..

    - name: Run C Self-Tests
      run: |
        cd core_c
        make test
        cd ..

    - name: Run Integration Tests
      run: |
        # Use PYTHONPATH to ensure imports work correctly in CI
        PYTHONPATH=. python -m pytest tests/test_engine.py -v -s
